<div class="login-wrapper">
  <div class="login-card m-5">

    <h3 class="title">Create Account</h3>
    <p class="subtitle">Please fill in the information below.</p>

    <form [formGroup]="registerForm" (ngSubmit)="submit()">

      <div class="form-group">
        <label>First Name</label>
        <input type="text" class="form-control" formControlName="nom" />
        <small class="error" *ngIf="submitted && f['nom'].errors">
          First name is required
        </small>
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" class="form-control" formControlName="prenom" />
        <small class="error" *ngIf="submitted && f['prenom'].errors">
          Last name is required
        </small>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          class="form-control"
          placeholder="example@email.com"
          formControlName="email"
        />
        <small class="error" *ngIf="submitted && f['email'].errors">
          Enter a valid email
        </small>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="tel"
          class="form-control"
          placeholder="+216..."
          formControlName="phone"
        />
        <small class="error" *ngIf="submitted && f['phone'].errors">
          Invalid phone number
        </small>
      </div>

      <div class="form-group">
        <label>Birth Date</label>
        <input type="date" class="form-control" formControlName="date_naissance" />
        <small class="error"
          *ngIf="submitted && f['date_naissance'].errors?.['minAge']">
          You must be at least 12 years old
        </small>
      </div>

      <div class="form-group mb-3">
        <label class="form-label">Région (Gouvernorat)</label>
        <select class="form-select" formControlName="region" (change)="onRegionChange($event)">
          <option value="" disabled selected>Choisir une région</option>
          <option *ngFor="let r of regions" [value]="r.id">{{ r.label }}</option>
        </select>
      </div>

      <div class="form-group mb-3">
        <label class="form-label">Ville</label>
        <select class="form-select" formControlName="ville">
          <option [ngValue]="null" disabled selected>Choisir une ville</option>
          <option *ngFor="let v of filteredVilles" [value]="v.id">
            {{ v.label }} ({{ v.code_postal }})
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" formControlName="password" />
        <small class="error" *ngIf="submitted && f['password'].errors">
          8 chars, upper, lower, number & symbol
        </small>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="confirmPassword"
        />
        <small class="error"
          *ngIf="submitted && registerForm.errors?.['passwordMismatch']">
          Passwords do not match
        </small>
      </div>

      <button type="submit" class="btn-login">
        Register
      </button>

    </form>

    <div class="extra-links">
      <span></span>
      <a routerLink="/login">Already have an account?</a>
    </div>

  </div>
</div>
